serenity.project.name=Saucedemo Automation
# Cambiamos el driver a Chrome
webdriver.driver=chrome

# Configuración para evitar el aviso de contraseñas y otros pop-ups
chrome.switches=--incognito;--disable-save-password-bubble;--remote-allow-origins=*;--disable-notifications

# Preferencias específicas para desactivar el gestor de contraseñas de Google
chrome_preferences.credentials_enable_service=false
chrome_preferences.profile.password_manager_enabled=false

serenity.browser.maximized=true
serenity.timeout=20000